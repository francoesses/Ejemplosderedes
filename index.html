document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b3b9bec0-dd24-4366-822c-712740c77dff\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ============================================================================\n   nona — Sistema Otoño\n   colors.css · Color tokens\n   ----------------------------------------------------------------------------\n   A warm, earthy, hand-made palette for a first-level health platform.\n   NARANJA is the protagonist + the bridge between both registers.\n   Two registers, one system:\n     · WARM / OTOÑO  (default, hero)  — habla a la persona: campañas, redes.\n     · MIDNIGHT      ([data-theme=\"dark\"]) — muestra el producto: app, triage.\n   Hard avoids: medical blue, hospital green, prepaga/lab look, Claude\n   cream+coral. Nothing here is neon.\n============================================================================ */\n\n:root {\n  /* ======================================================== RAW PALETTE === */\n\n  /* --- Otoño protagonist + supports --- */\n  --naranja:     #CF7F04;   /* protagonista · canvas cálido + acento puente */\n  --naranja-600: #B36E03;   /* hover */\n  --naranja-700: #935A02;   /* pressed */\n  --naranja-100: #F6E2BC;   /* faint tint bg */\n  --dorado:      #C6972F;   /* gold · fondo 2º + highlighter */\n  --dorado-600:  #AC8126;\n  --rosa:        #C78380;   /* dusty rose · lo humano / piel */\n  --rosa-600:    #B26B68;\n  --oliva:       #72784C;   /* olive · fondo alterno + \"ok\" cálido */\n  --oliva-600:   #5E6440;\n  --verde:       #2E7D5A;   /* pino cálido · acento \"vivo / cuidado\" en iconografía */\n  --verde-600:   #256448;\n  --verde-100:   #D6E8DE;   /* tint suave del verde */\n\n  /* --- Browns (ink on warm) --- */\n  --marron:      #543B20;   /* brown · texto fuerte + relleno oscuro cálido */\n  --marron-600:  #432F19;\n  --ink:         #3A2A14;   /* texto primario sobre crema */\n  --ink-2:       #6A5230;   /* texto secundario */\n  --ink-3:       #8A7A52;   /* muted / captions */\n  --ink-line:    rgba(84, 59, 32, 0.14);   /* hairline warm */\n  --ink-line-2:  rgba(84, 59, 32, 0.07);   /* faint divider */\n\n  /* --- Warm lights --- */\n  --manteca:     #F5E3A8;   /* butter · texto sobre oscuro / naranja */\n  --crema:       #FBF3DD;   /* canvas claro */\n  --crema-deep:  #F3E8C9;   /* banda de sección más profunda */\n  --paper:       #FFFFFF;   /* card sobre crema */\n\n  /* --- Functional (kept warm — NEVER medical) --- */\n  --ok:    #6E8B4E;         /* oliva-verde, no verde hospital */\n  --warn:  #C6972F;         /* dorado/ámbar */\n  --danger:#D9541E;         /* terracota anaranjada (urgencia, más naranja) */\n\n  /* --- Midnight register (the tech / product side) --- */\n  --midnight:    #1C2130;\n  --midnight-2:  #242B3D;   /* elevado */\n  --midnight-3:  #2E3650;   /* card on dark */\n  --midnight-deep:#161B28;\n  --teal:        #00B87C;   /* acento activo en midnight */\n  --teal-600:    #00A06C;\n  --teal-200:    rgba(0,184,124,0.16);\n  --coral-br:    #FF5230;   /* énfasis/urgencia en midnight */\n  --slate-fg:    #ECE6D6;   /* texto warm-white sobre oscuro */\n  --slate-2:     #B7BDCB;\n  --slate-3:     #828AA0;\n  --slate-line:  rgba(236, 230, 214, 0.14);\n\n  /* ================================================ SEMANTIC — WARM (def) === */\n  /* Manteca es el campo cálido protagonista; crema es el canvas base (poco). */\n  --bg:           var(--crema);       /* canvas base (uso liviano) */\n  --bg-deep:      var(--manteca);      /* campo cálido protagonista (bandas, hero) */\n  --bg-warm:      var(--manteca);      /* alias explícito del campo manteca */\n  --bg-hero:      var(--naranja);      /* full-bleed hero / campaign block */\n  --surface:      var(--paper);        /* cards */\n  --surface-2:    var(--manteca);      /* superficie cálida alterna */\n  --fg:           var(--ink);\n  --fg-2:         var(--ink-2);\n  --fg-3:         var(--ink-3);\n  --line:         var(--ink-line);\n  --line-faint:   var(--ink-line-2);\n\n  --accent:       var(--naranja);      /* protagonist + primary action */\n  --accent-deep:  var(--naranja-600);\n  --accent-soft:  var(--naranja-100);\n  --emphasis:     var(--naranja);      /* color de la palabra enfatizada (cálido) */\n  --highlighter:  var(--dorado);       /* marca del highlighter */\n  --on-accent:    var(--marron);       /* texto sobre naranja */\n  --on-hero:      var(--manteca);      /* texto sobre el hero naranja */\n  --kicker-on-hero: var(--marron);\n\n  /* contrast pair used by buttons/badges */\n  --on-marron:    var(--manteca);\n\n  /* --- solapamiento / sheet apilada (chips, botones, cards distintivas) --- */\n  --stack:        rgba(84, 59, 32, 0.22);   /* la \"hoja\" que asoma abajo */\n  --stack-soft:   rgba(84, 59, 32, 0.14);\n}\n\n/* ============================================================================\n   MIDNIGHT REGISTER — apply [data-theme=\"dark\"] to any subtree (app, estados)\n============================================================================ */\n[data-theme=\"dark\"] {\n  --bg:           var(--midnight);\n  --bg-deep:      var(--midnight-deep);\n  --bg-hero:      var(--midnight-2);\n  --surface:      var(--midnight-2);\n  --surface-2:    var(--midnight-3);\n  --fg:           var(--slate-fg);\n  --fg-2:         var(--slate-2);\n  --fg-3:         var(--slate-3);\n  --line:         var(--slate-line);\n  --line-faint:   rgba(236, 230, 214, 0.07);\n\n  --accent:       var(--teal);\n  --accent-deep:  var(--teal-600);\n  --accent-soft:  var(--teal-200);\n  --emphasis:     var(--coral-br);\n  --highlighter:  var(--teal);\n  --on-accent:    #04241A;\n  --on-hero:      var(--slate-fg);\n  --kicker-on-hero: var(--teal);\n\n  --ok:    var(--teal);\n  --warn:  var(--dorado);\n  --danger:var(--coral-br);\n\n  --stack:      rgba(0, 0, 0, 0.55);\n  --stack-soft: rgba(0, 0, 0, 0.40);\n}\n<\u002Fstyle>\n<style>/* ============================================================================\n   nona — Sistema Otoño\n   typography.css · Type roles, scale & emphasis system\n   ----------------------------------------------------------------------------\n   Dos voces sans + dos acentos:\n     --font-display  Space Grotesk 700 · titulares (display, UI titles)\n     --font-ui       Space Grotesk      · UI, kicker, chips, labels (chrome)\n     --font-body     DM Sans            · cuerpo / párrafos largos (lectura)\n     --font-accent   Fraunces ital 800  · ÉNFASIS (una palabra, pesa más)\n     --font-black    Archivo Black      · el \"grito\" (MAYÚS + bloque, ofertas)\n     --font-mono     Martian Mono       · técnico moderno (labels, datos, estados)\n   Rule of emphasis: ONE word per piece, and it must out-weigh its surroundings.\n============================================================================ */\n\n:root {\n  --font-display: 'Space Grotesk', system-ui, sans-serif;\n  --font-ui:      'Space Grotesk', system-ui, sans-serif;\n  --font-body:    'DM Sans', system-ui, sans-serif;\n  --font-accent:  'Fraunces', Georgia, serif;\n  --font-black:   'Archivo Black', system-ui, sans-serif;\n  --font-mono:    'Martian Mono', ui-monospace, monospace;\n\n  /* ----------------------------------------------------------- TYPE SCALE */\n  --text-display: clamp(2.6rem, 6vw, 4.4rem);    /* hero · Piazzolla */\n  --text-h1:      clamp(2.0rem, 3.8vw, 3.0rem);\n  --text-h2:      clamp(1.6rem, 2.8vw, 2.25rem);\n  --text-h3:      clamp(1.2rem, 1.7vw, 1.45rem);\n  --text-lead:    clamp(1.1rem, 1.4vw, 1.3rem);\n  --text-body:    1.0625rem;     /* 17px */\n  --text-small:   0.9375rem;     /* 15px */\n  --text-label:   0.75rem;       /* 12px · mono labels */\n\n  --lh-tight: 1.0;  /* @kind other */\n  --lh-snug:  1.12; /* @kind other */\n  --lh-body:  1.55; /* @kind other */\n\n  --tracking-tight: -0.02em;\n  --tracking-sans:  -0.03em;     /* Space Grotesk titulares */\n  --tracking-label:  0.16em;     /* mono / kicker uppercase */\n}\n\n/* ============================================================ ROLES ===== */\n.nona-type, .nona-root {\n  font-family: var(--font-body);\n  color: var(--fg);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display sans — Space Grotesk 700 (una sola voz, sin serif) */\n.nona-display {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-display);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-sans);\n  text-wrap: balance;\n  color: var(--fg);\n}\n.nona-h1 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-h1); line-height: var(--lh-snug); letter-spacing: var(--tracking-sans); text-wrap: balance; }\n.nona-h2 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-h2); line-height: var(--lh-snug); letter-spacing: var(--tracking-sans); }\n.nona-h3 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-h3); line-height: var(--lh-snug); letter-spacing: var(--tracking-sans); }\n\n/* alias del titular sans (compat) */\n.nona-sans-title {\n  font-family: var(--font-ui);\n  font-weight: 700;\n  font-size: var(--text-h2);\n  letter-spacing: var(--tracking-sans);\n  line-height: var(--lh-snug);\n}\n\n.nona-lead { font-size: var(--text-lead); line-height: 1.45; color: var(--fg-2); text-wrap: pretty; }\n.nona-body { font-family: var(--font-body); font-size: var(--text-body); line-height: var(--lh-body); text-wrap: pretty; }\n.nona-small { font-size: var(--text-small); line-height: 1.5; color: var(--fg-2); }\n\n/* Mono — técnico / labels / datos (Martian Mono: mecánica, moderna) */\n.nona-mono { font-family: var(--font-mono); font-size: var(--text-small); letter-spacing: 0.02em; color: var(--fg-2); }\n\n/* Kicker — Space Grotesk 700, UPPERCASE, tracked, \"/\" coloreado de naranja */\n.nona-kicker {\n  font-family: var(--font-ui);\n  font-weight: 700;\n  font-size: 0.8125rem;\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--fg-2);\n  display: inline-flex;\n  align-items: center;\n  gap: 0.6em;\n}\n.nona-kicker .sep { color: var(--accent); }\n[data-theme=\"dark\"] .nona-kicker .sep { color: var(--teal); }\n\n/* ============================================================================\n   ÉNFASIS — UNA palabra por pieza, siempre pesa MÁS que su entorno.\n   CÁLIDO  : Fraunces italic 800 (default) · highlighter dorado · outline marrón\n   MIDNIGHT: Fraunces italic 800 en teal/coral · outline crema · bloque naranja\n             Nunca un italic serif fino y perdido sobre oscuro.\n============================================================================ */\n\n/* (1) Fraunces italic 800 — default emocional. Color = --emphasis del registro */\n.nona-em, .em-italic {\n  font-family: var(--font-accent);\n  font-style: italic;\n  font-weight: 800;\n  font-size: 1.06em;       /* pesa un poco más que el titular */\n  line-height: 0.9;\n  letter-spacing: 0;\n  color: var(--emphasis);\n}\n\n/* (2) Highlighter — marca dorada en la mitad inferior de la palabra (cálido) */\n.em-highlight {\n  background: linear-gradient(180deg, transparent 44%, var(--highlighter) 44%);\n  color: var(--ink);\n  padding: 0 0.04em;\n}\n[data-theme=\"dark\"] .em-highlight { color: var(--slate-fg); }\n\n/* (3) Outline / hueco — contorno. 2px a TODOS los tamaños, nunca escalar el trazo */\n.em-outline {\n  font-family: var(--font-ui);\n  font-weight: 700;\n  -webkit-text-stroke: 2px var(--marron);\n  text-stroke: 2px var(--marron);\n  color: transparent;\n  font-style: normal;\n}\n[data-theme=\"dark\"] .em-outline, .em-outline-inv {\n  -webkit-text-stroke: 2px var(--slate-fg);\n  text-stroke: 2px var(--slate-fg);\n  color: transparent;\n}\n\n/* (4) Grito — Archivo Black + bloque. SOLO ofertas / urgencia. */\n.nona-grito {\n  font-family: var(--font-black);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-tight);\n  line-height: 1.05;\n}\n.nona-grito .blk {\n  background: var(--accent);\n  color: var(--on-accent);\n  padding: 0 0.1em;\n  border-radius: 6px;\n  box-decoration-break: clone;\n  -webkit-box-decoration-break: clone;\n}\n\n/* Guard: si un italic serif cae sobre midnight, al menos forzar el coral\n   brillante para que no se pierda (preferí outline o bloque). */\n[data-theme=\"dark\"] .nona-em,\n[data-theme=\"dark\"] .em-italic { color: var(--coral-br); }\n<\u002Fstyle>\n<style>/* ============================================================================\n   nona — Sistema Otoño\n   spacing.css · Spacing, radii, shadows & graphic-resource metrics\n   ----------------------------------------------------------------------------\n   4px base scale. Generosity (whitespace) is a brand value, not decoration.\n   Warm-tinted shadows only — never hard grey. On midnight, depth comes from\n   the surface step, not a heavier shadow.\n============================================================================ */\n\n:root {\n  /* ----------------------------------------------------------- SPACING (4px) */\n  --s-1: 4px;   --s-2: 8px;   --s-3: 12px;  --s-4: 16px;\n  --s-5: 20px;  --s-6: 24px;  --s-8: 32px;  --s-10: 40px;\n  --s-12: 48px; --s-16: 64px; --s-20: 80px; --s-24: 96px;\n\n  /* ----------------------------------------------------------------- RADII */\n  --r-xs:   6px;    /* chips internos / badges chicos */\n  --r-sm:   10px;\n  --r-md:   14px;   /* cards (valor del handoff Otoño) */\n  --r-lg:   18px;   /* cards grandes */\n  --r-xl:   28px;\n  --r-2xl:  40px;\n  --r-pill: 999px;  /* botones, chips, pills */\n\n  /* -------------------------------------------------- SHADOWS (warm-tinted) */\n  --shadow-sm: 0 1px 2px rgba(84, 59, 32, 0.06),\n               0 2px 6px rgba(84, 59, 32, 0.05);\n  --shadow-md: 0 4px 10px rgba(84, 59, 32, 0.07),\n               0 12px 28px rgba(84, 59, 32, 0.08);\n  --shadow-lg: 0 8px 20px rgba(84, 59, 32, 0.09),\n               0 28px 60px rgba(84, 59, 32, 0.12);\n  /* glow del CTA primario en el registro midnight */\n  --shadow-teal: 0 10px 34px rgba(0, 184, 124, 0.40);\n\n  /* ------------------------------------------------- MOTION (calm & warm) */\n  --ease: cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur:      200ms; /* @kind other */\n  --dur-slow: 300ms; /* @kind other */\n\n  /* --------------------------------------- GRAPHIC-RESOURCE METRICS (1080px) */\n  --cm-len:   28px;   /* largo de la \"L\" del corner-mark */\n  --cm-w:     2.5px;  /* trazo del corner-mark */\n  --cm-inset: 56px;   /* inset en una pieza de 1080 */\n  --badge-n:  58px;   /* lado de los badges n1/n2/n3 */\n}\n\n[data-theme=\"dark\"] {\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.40);\n  --shadow-md: 0 6px 18px rgba(0,0,0,0.45);\n  --shadow-lg: 0 18px 48px rgba(0,0,0,0.55);\n}\n<\u002Fstyle>\n<style>/* ============================================================================\n   nona — Sistema Otoño · Design System\n   styles.css · GLOBAL ENTRY POINT (import this one file)\n   ----------------------------------------------------------------------------\n   This file is a manifest of @import lines only — never inline rules here.\n   Everything it reaches is shipped to consumers.\n============================================================================ */\n\n/* ============================================================================\n   nona — Sistema Otoño\n   fonts.css · Webfont declarations\n   ----------------------------------------------------------------------------\n   Five families, all real Google Fonts (no substitution):\n     · Space Grotesk    — display + UI (títulos, chrome, chips, labels)\n C, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b0396b77-5037-471f-9f8c-60dabfa0390c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"eae81d8c-575f-4f92-bf03-fe1582f5944c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b3b9bec0-dd24-4366-822c-712740c77dff\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================================\n   nona — Sistema Otoño\n   colors.css · Color tokens\n   ----------------------------------------------------------------------------\n   A warm, earthy, hand-made palette for a first-level health platform.\n   NARANJA is the protagonist + the bridge between both registers.\n   Two registers, one system:\n     · WARM / OTOÑO  (default, hero)  — habla a la persona: campañas, redes.\n     · MIDNIGHT      ([data-theme=\"dark\"]) — muestra el producto: app, triage.\n   Hard avoids: medical blue, hospital green, prepaga/lab look, Claude\n   cream+coral. Nothing here is neon.\n============================================================================ */\n\n:root {\n  /* ======================================================== RAW PALETTE === */\n\n  /* --- Otoño protagonist + supports --- */\n  --naranja:     #CF7F04;   /* protagonista · canvas cálido + acento puente */\n  --naranja-600: #B36E03;   /* hover */\n  --naranja-700: #935A02;   /* pressed */\n  --naranja-100: #F6E2BC;   /* faint tint bg */\n  --dorado:      #C6972F;   /* gold · fondo 2º + highlighter */\n  --dorado-600:  #AC8126;\n  --rosa:        #C78380;   /* dusty rose · lo humano / piel */\n  --rosa-600:    #B26B68;\n  --oliva:       #72784C;   /* olive · fondo alterno + \"ok\" cálido */\n  --oliva-600:   #5E6440;\n  --verde:       #2E7D5A;   /* pino cálido · acento \"vivo / cuidado\" en iconografía */\n  --verde-600:   #256448;\n  --verde-100:   #D6E8DE;   /* tint suave del verde */\n\n  /* --- Browns (ink on warm) --- */\n  --marron:      #543B20;   /* brown · texto fuerte + relleno oscuro cálido */\n  --marron-600:  #432F19;\n  --ink:         #3A2A14;   /* texto primario sobre crema */\n  --ink-2:       #6A5230;   /* texto secundario */\n  --ink-3:       #8A7A52;   /* muted / captions */\n  --ink-line:    rgba(84, 59, 32, 0.14);   /* hairline warm */\n  --ink-line-2:  rgba(84, 59, 32, 0.07);   /* faint divider */\n\n  /* --- Warm lights --- */\n  --manteca:     #F5E3A8;   /* butter · texto sobre oscuro / naranja */\n  --crema:       #FBF3DD;   /* canvas claro */\n  --crema-deep:  #F3E8C9;   /* banda de sección más profunda */\n  --paper:       #FFFFFF;   /* card sobre crema */\n\n  /* --- Functional (kept warm — NEVER medical) --- */\n  --ok:    #6E8B4E;         /* oliva-verde, no verde hospital */\n  --warn:  #C6972F;         /* dorado/ámbar */\n  --danger:#D9541E;         /* terracota anaranjada (urgencia, más naranja) */\n\n  /* --- Midnight register (the tech / product side) --- */\n  --midnight:    #1C2130;\n  --midnight-2:  #242B3D;   /* elevado */\n  --midnight-3:  #2E3650;   /* card on dark */\n  --midnight-deep:#161B28;\n  --teal:        #00B87C;   /* acento activo en midnight */\n  --teal-600:    #00A06C;\n  --teal-200:    rgba(0,184,124,0.16);\n  --coral-br:    #FF5230;   /* énfasis/urgencia en midnight */\n  --slate-fg:    #ECE6D6;   /* texto warm-white sobre oscuro */\n  --slate-2:     #B7BDCB;\n  --slate-3:     #828AA0;\n  --slate-line:  rgba(236, 230, 214, 0.14);\n\n  /* ================================================ SEMANTIC — WARM (def) === */\n  /* Manteca es el campo cálido protagonista; crema es el canvas base (poco). */\n  --bg:           var(--crema);       /* canvas base (uso liviano) */\n  --bg-deep:      var(--manteca);      /* campo cálido protagonista (bandas, hero) */\n  --bg-warm:      var(--manteca);      /* alias explícito del campo manteca */\n  --bg-hero:      var(--naranja);      /* full-bleed hero / campaign block */\n  --surface:      var(--paper);        /* cards */\n  --surface-2:    var(--manteca);      /* superficie cálida alterna */\n  --fg:           var(--ink);\n  --fg-2:         var(--ink-2);\n  --fg-3:         var(--ink-3);\n  --line:         var(--ink-line);\n  --line-faint:   var(--ink-line-2);\n\n  --accent:       var(--naranja);      /* protagonist + primary action */\n  --accent-deep:  var(--naranja-600);\n  --accent-soft:  var(--naranja-100);\n  --emphasis:     var(--naranja);      /* color de la palabra enfatizada (cálido) */\n  --highlighter:  var(--dorado);       /* marca del highlighter */\n  --on-accent:    var(--marron);       /* texto sobre naranja */\n  --on-hero:      var(--manteca);      /* texto sobre el hero naranja */\n  --kicker-on-hero: var(--marron);\n\n  /* contrast pair used by buttons/badges */\n  --on-marron:    var(--manteca);\n\n  /* --- solapamiento / sheet apilada (chips, botones, cards distintivas) --- */\n  --stack:        rgba(84, 59, 32, 0.22);   /* la \"hoja\" que asoma abajo */\n  --stack-soft:   rgba(84, 59, 32, 0.14);\n}\n\n/* ============================================================================\n   MIDNIGHT REGISTER — apply [data-theme=\"dark\"] to any subtree (app, estados)\n============================================================================ */\n[data-theme=\"dark\"] {\n  --bg:           var(--midnight);\n  --bg-deep:      var(--midnight-deep);\n  --bg-hero:      var(--midnight-2);\n  --surface:      var(--midnight-2);\n  --surface-2:    var(--midnight-3);\n  --fg:           var(--slate-fg);\n  --fg-2:         var(--slate-2);\n  --fg-3:         var(--slate-3);\n  --line:         var(--slate-line);\n  --line-faint:   rgba(236, 230, 214, 0.07);\n\n  --accent:       var(--teal);\n  --accent-deep:  var(--teal-600);\n  --accent-soft:  var(--teal-200);\n  --emphasis:     var(--coral-br);\n  --highlighter:  var(--teal);\n  --on-accent:    #04241A;\n  --on-hero:      var(--slate-fg);\n  --kicker-on-hero: var(--teal);\n\n  --ok:    var(--teal);\n  --warn:  var(--dorado);\n  --danger:var(--coral-br);\n\n  --stack:      rgba(0, 0, 0, 0.55);\n  --stack-soft: rgba(0, 0, 0, 0.40);\n}\n\n/* ============================================================================\n   nona — Sistema Otoño\n   typography.css · Type roles, scale & emphasis system\n   ----------------------------------------------------------------------------\n   Dos voces sans + dos acentos:\n     --font-display  Space Grotesk 700 · titulares (display, UI titles)\n     --font-ui       Space Grotesk      · UI, kicker, chips, labels (chrome)\n     --font-body     DM Sans            · cuerpo / párrafos largos (lectura)\n     --font-accent   Fraunces ital 800  · ÉNFASIS (una palabra, pesa más)\n     --font-black    Archivo Black      · el \"grito\" (MAYÚS + bloque, ofertas)\n     --font-mono     Martian Mono       · técnico moderno (labels, datos, estados)\n   Rule of emphasis: ONE word per piece, and it must out-weigh its surroundings.\n============================================================================ */\n\n:root {\n  --font-display: 'Space Grotesk', system-ui, sans-serif;\n  --font-ui:      'Space Grotesk', system-ui, sans-serif;\n  --font-body:    'DM Sans', system-ui, sans-serif;\n  --font-accent:  'Fraunces', Georgia, serif;\n  --font-black:   'Archivo Black', system-ui, sans-serif;\n  --font-mono:    'Martian Mono', ui-monospace, monospace;\n\n  /* ----------------------------------------------------------- TYPE SCALE */\n  --text-display: clamp(2.6rem, 6vw, 4.4rem);    /* hero · Piazzolla */\n  --text-h1:      clamp(2.0rem, 3.8vw, 3.0rem);\n  --text-h2:      clamp(1.6rem, 2.8vw, 2.25rem);\n  --text-h3:      clamp(1.2rem, 1.7vw, 1.45rem);\n  --text-lead:    clamp(1.1rem, 1.4vw, 1.3rem);\n  --text-body:    1.0625rem;     /* 17px */\n  --text-small:   0.9375rem;     /* 15px */\n  --text-label:   0.75rem;       /* 12px · mono labels */\n\n  --lh-tight: 1.0;  /* @kind other */\n  --lh-snug:  1.12; /* @kind other */\n  --lh-body:  1.55; /* @kind other */\n\n  --tracking-tight: -0.02em;\n  --tracking-sans:  -0.03em;     /* Space Grotesk titulares */\n  --tracking-label:  0.16em;     /* mono / kicker uppercase */\n}\n\n/* ============================================================ ROLES ===== */\n.nona-type, .nona-root {\n  font-family: var(--font-body);\n  color: var(--fg);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display sans — Space Grotesk 700 (una sola voz, sin serif) */\n.nona-display {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-display);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-sans);\n  text-wrap: balance;\n  color: var(--fg);\n}\n.nona-h1 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-h1); line-height: var(--lh-snug); letter-spacing: var(--tracking-sans); text-wrap: balance; }\n.nona-h2 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-h2); line-height: var(--lh-snug); letter-spacing: var(--tracking-sans); }\n.nona-h3 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-h3); line-height: var(--lh-snug); letter-spacing: var(--tracking-sans); }\n\n/* alias del titular sans (compat) */\n.nona-sans-title {\n  font-family: var(--font-ui);\n  font-weight: 700;\n  font-size: var(--text-h2);\n  letter-spacing: var(--tracking-sans);\n  line-height: var(--lh-snug);\n}\n\n.nona-lead { font-size: var(--text-lead); line-height: 1.45; color: var(--fg-2); text-wrap: pretty; }\n.nona-body { font-family: var(--font-body); font-size: var(--text-body); line-height: var(--lh-body); text-wrap: pretty; }\n.nona-small { font-size: var(--text-small); line-height: 1.5; color: var(--fg-2); }\n\n/* Mono — técnico / labels / datos (Martian Mono: mecánica, moderna) */\n.nona-mono { font-family: var(--font-mono); font-size: var(--text-small); letter-spacing: 0.02em; color: var(--fg-2); }\n\n/* Kicker — Space Grotesk 700, UPPERCASE, tracked, \"/\" coloreado de naranja */\n.nona-kicker {\n  font-family: var(--font-ui);\n  font-weight: 700;\n  font-size: 0.8125rem;\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--fg-2);\n  display: inline-flex;\n  align-items: center;\n  gap: 0.6em;\n}\n.nona-kicker .sep { color: var(--accent); }\n[data-theme=\"dark\"] .nona-kicker .sep { color: var(--teal); }\n\n/* ============================================================================\n   ÉNFASIS — UNA palabra por pieza, siempre pesa MÁS que su entorno.\n   CÁLIDO  : Fraunces italic 800 (default) · highlighter dorado · outline marrón\n   MIDNIGHT: Fraunces italic 800 en teal/coral · outline crema · bloque naranja\n             Nunca un italic serif fino y perdido sobre oscuro.\n============================================================================ */\n\n/* (1) Fraunces italic 800 — default emocional. Color = --emphasis del registro */\n.nona-em, .em-italic {\n  font-family: var(--font-accent);\n  font-style: italic;\n  font-weight: 800;\n  font-size: 1.06em;       /* pesa un poco más que el titular */\n  line-height: 0.9;\n  letter-spacing: 0;\n  color: var(--emphasis);\n}\n\n/* (2) Highlighter — marca dorada en la mitad inferior de la palabra (cálido) */\n.em-highlight {\n  background: linear-gradient(180deg, transparent 44%, var(--highlighter) 44%);\n  color: var(--ink);\n  padding: 0 0.04em;\n}\n[data-theme=\"dark\"] .em-highlight { color: var(--slate-fg); }\n\n/* (3) Outline / hueco — contorno. 2px a TODOS los tamaños, nunca escalar el trazo */\n.em-outline {\n  font-family: var(--font-ui);\n  font-weight: 700;\n  -webkit-text-stroke: 2px var(--marron);\n  text-stroke: 2px var(--marron);\n  color: transparent;\n  font-style: normal;\n}\n[data-theme=\"dark\"] .em-outline, .em-outline-inv {\n  -webkit-text-stroke: 2px var(--slate-fg);\n  text-stroke: 2px var(--slate-fg);\n  color: transparent;\n}\n\n/* (4) Grito — Archivo Black + bloque. SOLO ofertas / urgencia. */\n.nona-grito {\n  font-family: var(--font-black);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-tight);\n  line-height: 1.05;\n}\n.nona-grito .blk {\n  background: var(--accent);\n  color: var(--on-accent);\n  padding: 0 0.1em;\n  border-radius: 6px;\n  box-decoration-break: clone;\n  -webkit-box-decoration-break: clone;\n}\n\n/* Guard: si un italic serif cae sobre midnight, al menos forzar el coral\n   brillante para que no se pierda (preferí outline o bloque). */\n[data-theme=\"dark\"] .nona-em,\n[data-theme=\"dark\"] .em-italic { color: var(--coral-br); }\n\n/* ============================================================================\n   nona — Sistema Otoño\n   spacing.css · Spacing, radii, shadows & graphic-resource metrics\n   ----------------------------------------------------------------------------\n   4px base scale. Generosity (whitespace) is a brand value, not decoration.\n   Warm-tinted shadows only — never hard grey. On midnight, depth comes from\n   the surface step, not a heavier shadow.\n============================================================================ */\n\n:root {\n  /* ----------------------------------------------------------- SPACING (4px) */\n  --s-1: 4px;   --s-2: 8px;   --s-3: 12px;  --s-4: 16px;\n  --s-5: 20px;  --s-6: 24px;  --s-8: 32px;  --s-10: 40px;\n  --s-12: 48px; --s-16: 64px; --s-20: 80px; --s-24: 96px;\n\n  /* ----------------------------------------------------------------- RADII */\n  --r-xs:   6px;    /* chips internos / badges chicos */\n  --r-sm:   10px;\n  --r-md:   14px;   /* cards (valor del handoff Otoño) */\n  --r-lg:   18px;   /* cards grandes */\n  --r-xl:   28px;\n  --r-2xl:  40px;\n  --r-pill: 999px;  /* botones, chips, pills */\n\n  /* -------------------------------------------------- SHADOWS (warm-tinted) */\n  --shadow-sm: 0 1px 2px rgba(84, 59, 32, 0.06),\n               0 2px 6px rgba(84, 59, 32, 0.05);\n  --shadow-md: 0 4px 10px rgba(84, 59, 32, 0.07),\n               0 12px 28px rgba(84, 59, 32, 0.08);\n  --shadow-lg: 0 8px 20px rgba(84, 59, 32, 0.09),\n               0 28px 60px rgba(84, 59, 32, 0.12);\n  /* glow del CTA primario en el registro midnight */\n  --shadow-teal: 0 10px 34px rgba(0, 184, 124, 0.40);\n\n  /* ------------------------------------------------- MOTION (calm & warm) */\n  --ease: cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur:      200ms; /* @kind other */\n  --dur-slow: 300ms; /* @kind other */\n\n  /* --------------------------------------- GRAPHIC-RESOURCE METRICS (1080px) */\n  --cm-len:   28px;   /* largo de la \"L\" del corner-mark */\n  --cm-w:     2.5px;  /* trazo del corner-mark */\n  --cm-inset: 56px;   /* inset en una pieza de 1080 */\n  --badge-n:  58px;   /* lado de los badges n1/n2/n3 */\n}\n\n[data-theme=\"dark\"] {\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.40);\n  --shadow-md: 0 6px 18px rgba(0,0,0,0.45);\n  --shadow-lg: 0 18px 48px rgba(0,0,0,0.55);\n}\n\n<\u002Fstyle>\n<script src=\"bacd1f1a-7225-42a4-9f61-20be672359af\"><\u002Fscript>\n<style>\n  body { m

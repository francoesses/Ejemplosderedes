document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"56497a9a-76d4-4028-85d6-efef3d1ebaf6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"66dcb287-e492-4b0a-90b1-7840d6d68eaf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------------------------------------------------------------- FONTS */\n  --font-heading: 'DM Sans', system-ui, sans-serif;             /* display/h1/h2 — DM Sans 700 */\n  --font-display: 'DM Sans', system-ui, sans-serif;              /* UI — botones, nav, labels, steps */\n  --font-body:    'DM Sans', system-ui, sans-serif;              /* cuerpo — amigable, fino, cálido */\n  --font-accent:  'DM Sans', system-ui, sans-serif;              /* italic énfasis 300 — mismo family, sutil */\n  --font-mono:    'Space Mono', ui-monospace, monospace;         /* n1/n2/n3, labels, corner marks */\n\n  /* ======================================================================\n     COLOR — RAW PALETTE\n     ====================================================================== */\n\n  /* --- Cream family (warm canvas) --- */\n  --cream:        #F2EBD9;   /* base canvas */\n  --cream-deep:   #EAE0C7;   /* deeper section band */\n  --paper:        #FBF7EC;   /* card / elevated warm white */\n  --paper-pure:   #FEFCF6;   /* highest elevation */\n\n  /* --- Graphite / ink family --- */\n  --ink:          #2A2A2A;   /* primary text */\n  --ink-2:        #524F49;   /* secondary text */\n  --ink-3:        #847F73;   /* muted text / captions */\n  --ink-line:     rgba(42, 42, 42, 0.12);   /* hairline borders */\n  --ink-line-2:   rgba(42, 42, 42, 0.06);   /* faint dividers */\n\n  /* --- Mint (active / primary action) --- */\n  --mint:         #5EC48A;\n  --mint-600:     #4BA07A;   /* moss — hover / support */\n  --mint-700:     #3C8A67;   /* pressed */\n  --mint-200:     #BFE7CE;   /* soft fill */\n  --mint-100:     #DFF2E7;   /* faint tint bg */\n\n  /* --- Coral (emphasis / energy) --- */\n  --coral:        #E85A35;\n  --coral-600:    #CF4824;   /* hover */\n  --coral-700:    #B23A1A;   /* pressed */\n  --coral-200:    #F6D0C3;   /* soft fill */\n  --coral-100:    #FAE3DB;   /* faint tint bg */\n\n  /* --- Functional (kept warm, NOT medical) --- */\n  --ok:           #4BA07A;   /* uses moss, never hospital green */\n  --warn:         #E8A435;   /* amber */\n  --info:         #3C8A67;   /* muted moss-teal, never medical blue */\n\n  /* --- Midnight family (dark register) --- */\n  --midnight:     #1C2130;   /* dark base */\n  --midnight-2:   #242B3D;   /* elevated */\n  --midnight-3:   #2E3650;   /* card on dark */\n  --teal:         #00B87C;   /* dark-mode active accent */\n  --teal-600:     #00A06C;\n  --coral-bright: #FF5230;   /* dark-mode emphasis */\n  --slate-fg:     #ECE6D6;   /* warm off-white text on dark */\n  --slate-2:      #B7BDCB;   /* secondary on dark */\n  --slate-3:      #828AA0;   /* muted on dark */\n  --slate-line:   rgba(236, 230, 214, 0.14);\n\n  /* ======================================================================\n     SEMANTIC TOKENS — LIGHT (default / hero)\n     ====================================================================== */\n  --bg:           var(--cream);\n  --bg-deep:      var(--cream-deep);\n  --surface:      var(--paper);\n  --surface-high: var(--paper-pure);\n  --fg:           var(--ink);\n  --fg-2:         var(--ink-2);\n  --fg-3:         var(--ink-3);\n  --line:         var(--ink-line);\n  --line-faint:   var(--ink-line-2);\n\n  --accent:       var(--mint);        /* active */\n  --accent-deep:  var(--mint-600);\n  --accent-soft:  var(--mint-100);\n  --emphasis:     var(--coral);       /* energy / highlight */\n  --emphasis-soft:var(--coral-100);\n  --on-accent:    #14391F;            /* ink on mint button */\n  --on-emphasis:  #FFFFFF;            /* text on coral */\n\n  /* ======================================================================\n     RADII\n     ====================================================================== */\n  --r-xs:  6px;\n  --r-sm:  10px;\n  --r-md:  16px;\n  --r-lg:  24px;\n  --r-xl:  34px;\n  --r-2xl: 48px;\n  --r-pill: 999px;\n\n  /* ======================================================================\n     SPACING (4px base)\n     ====================================================================== */\n  --s-1: 4px;   --s-2: 8px;   --s-3: 12px;  --s-4: 16px;\n  --s-5: 20px;  --s-6: 24px;  --s-8: 32px;  --s-10: 40px;\n  --s-12: 48px; --s-16: 64px; --s-20: 80px; --s-24: 96px;\n\n  /* ======================================================================\n     SHADOWS — warm-tinted, soft (never hard grey)\n     ====================================================================== */\n  --shadow-sm:  0 1px 2px rgba(60, 48, 24, 0.06),\n                0 2px 6px rgba(60, 48, 24, 0.05);\n  --shadow-md:  0 4px 10px rgba(60, 48, 24, 0.07),\n                0 12px 28px rgba(60, 48, 24, 0.08);\n  --shadow-lg:  0 8px 20px rgba(60, 48, 24, 0.09),\n                0 28px 60px rgba(60, 48, 24, 0.12);\n  --shadow-mint: 0 10px 30px rgba(75, 160, 122, 0.28);\n\n  /* Liquid glass (used on dark / over imagery) */\n  --glass-fill:   rgba(255, 255, 255, 0.08);\n  --glass-stroke: rgba(255, 255, 255, 0.22);\n  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);\n  --glass-blur:   blur(14px) saturate(140%);\n\n  /* ======================================================================\n     TYPE SCALE  (fluid, large + direct — never below ~16px body)\n     ====================================================================== */\n  --text-display: clamp(2.75rem, 6vw, 5rem);     /* hero */\n  --text-h1:      clamp(2.1rem, 4vw, 3.25rem);\n  --text-h2:      clamp(1.6rem, 2.6vw, 2.25rem);\n  --text-h3:      clamp(1.25rem, 1.8vw, 1.5rem);\n  --text-lead:    clamp(1.15rem, 1.5vw, 1.4rem);  /* intro paragraph */\n  --text-body:    1.0625rem;                      /* 17px */\n  --text-small:   0.9375rem;                      /* 15px */\n  --text-label:   0.75rem;                        /* mono labels */\n\n  --lh-tight: 1.04;\n  --lh-snug:  1.18;\n  --lh-body:  1.55;\n\n  --tracking-tight: -0.02em;\n  --tracking-label:  0.14em;   /* mono uppercase labels */\n}\n\n/* ============================================================================\n   DARK REGISTER  —  apply to any subtree with [data-theme=\"dark\"]\n============================================================================ */\n[data-theme=\"dark\"] {\n  --bg:           var(--midnight);\n  --bg-deep:      #161B28;\n  --surface:      var(--midnight-2);\n  --surface-high: var(--midnight-3);\n  --fg:           var(--slate-fg);\n  --fg-2:         var(--slate-2);\n  --fg-3:         var(--slate-3);\n  --line:         var(--slate-line);\n  --line-faint:   rgba(236, 230, 214, 0.07);\n\n  --accent:       var(--teal);\n  --accent-deep:  var(--teal-600);\n  --accent-soft:  rgba(0, 184, 124, 0.14);\n  --emphasis:     var(--coral-bright);\n  --emphasis-soft:rgba(255, 82, 48, 0.16);\n  --on-accent:    #04241A;\n  --on-emphasis:  #2A0E07;\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-md: 0 6px 18px rgba(0,0,0,0.45);\n  --shadow-lg: 0 18px 48px rgba(0,0,0,0.55);\n}\n\n/* ============================================================================\n   SEMANTIC ELEMENT DEFAULTS  (opt-in via .koa-type or use the vars directly)\n============================================================================ */\n.koa-type, .koa-root {\n  font-family: var(--font-body);\n  color: var(--fg);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.koa-display {\n  font-family: var(--font-heading);\n  font-weight: 700;\n  font-size: var(--text-display);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  text-wrap: balance;\n}\n.koa-h1 { font-family: var(--font-heading); font-weight: 700; font-size: var(--text-h1); line-height: var(--lh-snug); letter-spacing: -.025em; text-wrap: balance; }\n.koa-h2 { font-family: var(--font-heading); font-weight: 700; font-size: var(--text-h2); line-height: var(--lh-snug); letter-spacing: -.02em; }\n.koa-h3 { font-family: var(--font-heading); font-weight: 600; font-size: var(--text-h3); line-height: var(--lh-snug); }\n.koa-lead { font-size: var(--text-lead); line-height: 1.45; color: var(--fg-2); text-wrap: pretty; }\n.koa-body { font-size: var(--text-body); line-height: var(--lh-body); text-wrap: pretty; }\n.koa-small { font-size: var(--text-small); line-height: 1.5; color: var(--fg-2); }\n\n/* Fraunces italic — EMPHASIS WORDS ONLY, never whole paragraphs */\n.koa-em {\n  font-family: var(--font-accent);\n  font-style: italic;\n  font-weight: 500;\n  letter-spacing: 0;\n}\n\n/* Mono label — n1 / n2 / corner marks / kicker */\n.koa-label {\n  font-family: var(--font-mono);\n  font-size: var(--text-label);\n  font-weight: 700;\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n<\u002Fstyle>\n<style>\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  background: #C4BB0B;\n  background: #BFB8A8;\n  font-family: 'Space Grotesk', sans-serif;\n  padding: 52px 44px 96px;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ── Page chrome ── */\n.pg-header { margin-bottom: 56px; }\n.pg-eyebrow {\n  font-family: 'Space Mono', monospace;\n  font-size: 11px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.45);\n  margin-bottom: 10px;\n}\n.pg-title {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 24px;\n  letter-spacing: -0.02em;\n  color: #2A2A2A;\n  margin-bottom: 5px;\n}\n.pg-sub { font-size: 13px; color: rgba(42,42,42,0.5); }\n\n/* ══════════════════════════════════════\n   TYPE SYSTEM LEGEND\n   ══════════════════════════════════════ */\n.type-legend {\n  background: #F2EBD9;\n  border-radius: 16px;\n  padding: 36px 44px;\n  margin-bottom: 56px;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0 60px;\n}\n.legend-title {\n  font-family: 'Space Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.4);\n  margin-bottom: 22px;\n  grid-column: 1 / -1;\n}\n.legend-col {}\n.legend-row {\n  display: flex;\n  align-items: baseline;\n  gap: 20px;\n  padding: 12px 0;\n  border-bottom: 1px solid rgba(42,42,42,0.09);\n}\n.legend-row:last-child { border-bottom: none; }\n.legend-sample { flex: 0 0 200px; }\n.legend-meta {\n  font-family: 'Space Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.10em;\n  color: rgba(42,42,42,0.42);\n  line-height: 1.5;\n}\n.legend-meta strong {\n  display: block;\n  color: rgba(42,42,42,0.65);\n  font-weight: 700;\n  margin-bottom: 2px;\n}\n.ls-display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -0.03em; color: #2A2A2A; }\n.ls-sub     { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; color: #2A2A2A; }\n.ls-body    { font-family: 'Space Grotesk', sans-serif; font-weight: 400; font-size: 15px; color: #2A2A2A; }\n.ls-mono    { font-family: 'Space Mono', monospace;    font-weight: 700; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #2A2A2A; }\n\n.emph-legend {\n  grid-column: 1 / -1;\n  margin-top: 24px;\n  padding-top: 24px;\n  border-top: 1px solid rgba(42,42,42,0.12);\n}\n.emph-title {\n  font-family: 'Space Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.4);\n  margin-bottom: 18px;\n}\n.emph-row {\n  display: flex;\n  gap: 24px;\n  flex-wrap: wrap;\n  align-items: center;\n}\n.emph-chip {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  background: rgba(42,42,42,0.06);\n  border-radius: 10px;\n  padding: 10px 18px;\n}\n.emph-chip .badge {\n  font-family: 'Space Mono', monospace;\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  background: #2A2A2A;\n  color: #F2EBD9;\n  padding: 3px 7px;\n  border-radius: 4px;\n}\n.emph-chip .preview {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 22px;\n  letter-spacing: -0.02em;\n  color: #2A2A2A;\n}\n/* inline emphasis previews */\n.ep3  { color: #E85A35; }\n.ep5  { display:inline-block; background:#E85A35; color:#fff; border-radius:8px; padding:0 10px 3px; line-height:1.2; }\n.ep7  { -webkit-text-stroke:2px #2A2A2A; color:transparent; }\n.ep9  { background:linear-gradient(180deg,transparent 38%,rgba(94,196,138,.5) 38%); }\n.emph-chip .desc {\n  font-size: 12px;\n  color: rgba(42,42,42,0.45);\n}\n\n/* ══════════════════════════════════════\n   POSTS GRID\n   ══════════════════════════════════════ */\n.section-head {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  margin-bottom: 26px;\n  padding-bottom: 16px;\n  border-bottom: 1px solid rgba(42,42,42,0.15);\n}\n.section-label {\n  font-family: 'Space Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.45);\n}\n.section-name {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 16px;\n  color: #2A2A2A;\n}\n\n.posts-row {\n  display: flex;\n  gap: 24px;\n  flex-wrap: wrap;\n  margin-bottom: 64px;\n  align-items: flex-start;\n}\n.post-group {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 10px;\n}\n.post-meta {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.post-badge-em {\n  font-family: 'Space Mono', monospace;\n  font-size: 9px;\n  font-weight: 700;\n  letter-spacing: 0.10em;\n  text-transform: uppercase;\n  background: rgba(42,42,42,0.14);\n  color: rgba(42,42,42,0.55);\n  padding: 3px 7px;\n  border-radius: 4px;\n}\n.post-size-label {\n  font-family: 'Space Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.10em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.32);\n}\n\n/* Scale wrappers */\n.post-wrap { flex: none; overflow: hidden; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.10); }\n.post-wrap.sq    { width: calc(1080px * .37); height: calc(1080px * .37); }\n.post-wrap.story { width: calc(1080px * .22); height: calc(1920px * .22); }\n.canvas { transform-origin: top left; display: block; }\n.post-wrap.sq    .canvas { transform: scale(.37); width: 1080px; height: 1080px; }\n.post-wrap.story .canvas { transform: scale(.22); width: 1080px; height: 1920px; }\n\n/* ══════════════════════════════════════\n   SHARED CANVAS ELEMENTS\n   ══════════════════════════════════════ */\n.cm { position: absolute; width: 28px; height: 28px; border-style: solid; }\n.cm-tl { top: 56px;    left: 56px;    border-width: 2.5px 0 0 2.5px; }\n.cm-tr { top: 56px;    right: 56px;   border-width: 2.5px 2.5px 0 0; }\n.cm-bl { bottom: 56px; left: 56px;    border-width: 0 0 2.5px 2.5px; }\n.cm-br { bottom: 56px; right: 56px;   border-width: 0 2.5px 2.5px 0; }\n\n.lockup {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n}\n.lockup img { width: 40px; height: 40px; }\n.lockup-word {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 33px;\n  letter-spacing: -0.03em;\n  color: var(--ink);\n}\n.lockup-word .dot { color: #E85A35; }\n.lockup-word.inv   { color: #F0EAD8; }\n.lockup-word.inv .dot { color: #FF5230; }\n\n\n/* ══════════════════════════════════════\n   INDIVIDUAL POST DESIGNS\n   ══════════════════════════════════════ */\n\n/* ── Base post shell ── */\n.post {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  overflow: hidden;\n}\n.post.sq    { width: 1080px; height: 1080px; padding: 72px; }\n.post.story { width: 1080px; height: 1920px; padding: 96px 80px; }\n\n/* P1 · Cream · \"Gratis, de verdad.\" · Énfasis 3 (color) */\n.p1 { background: #F2EBD9; }\n.p1 .kicker {\n  font-family: 'Space Mono', monospace;\n  font-size: 20px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.38);\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-bottom: 44px;\n}\n.p1 .kicker .slash { color: #E85A35; }\n.p1 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 128px;\n  line-height: 1.00;\n  letter-spacing: -0.04em;\n  color: #2A2A2A;\n}\n.p1 .em { color: #E85A35; }\n.p1 .sub {\n  font-family: 'Space Grotesk', sans-serif;\n  font-size: 30px;\n  line-height: 1.5;\n  color: rgba(42,42,42,0.55);\n}\n\n/* P2 · Paper · \"Escribís. Te atendemos.\" · Énfasis 9 (highlight) */\n.p2 { background: #FBF7EC; }\n.p2 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 108px;\n  line-height: 1.06;\n  letter-spacing: -0.035em;\n  color: #2A2A2A;\n}\n.p2 .em {\n  background: linear-gradient(180deg, transparent 40%, rgba(94,196,138,.5) 40%);\n  display: inline;\n}\n.p2 .sub {\n  font-family: 'Space Grotesk', sans-serif;\n  font-size: 28px;\n  line-height: 1.5;\n  color: rgba(42,42,42,0.5);\n}\n.p2 .pills {\n  display: flex;\n  align-items: center;\n  gap: 24px;\n  font-family: 'Space Mono', monospace;\n  font-size: 20px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.38);\n}\n.p2 .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }\n\n/* P3 · Midnight · \"Sin turno. Sin espera. Sin vueltas.\" · Énfasis 7 (outline) */\n.p3 { background: #1C2130; }\n.p3::before {\n  content: '';\n  position: absolute; inset: 0; pointer-events: none;\n  background: radial-gradient(ellipse 72% 72% at 20% 30%, rgba(0,184,124,.22) 0%, transparent 64%);\n}\n.p3 .kicker {\n  font-family: 'Space Mono', monospace;\n  font-size: 20px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: rgba(240,234,216,0.35);\n  margin-bottom: 48px;\n  display: inline-flex;\n  align-items: center;\n  gap: 14px;\n  background: rgba(255,255,255,.07);\n  border: 1.5px solid rgba(255,255,255,.16);\n  border-radius: 999px;\n  padding: 14px 28px;\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n}\n.p3 .kicker .pulse { width: 10px; height: 10px; border-radius: 50%; background: #00B87C; box-shadow: 0 0 14px rgba(0,184,124,.9); }\n.p3 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 100px;\n  line-height: 1.06;\n  letter-spacing: -0.03em;\n  color: #F0EAD8;\n}\n.p3 .em {\n  -webkit-text-stroke: 2.5px #F0EAD8;\n  color: transparent;\n}\n.p3 .sub {\n  font-family: 'Space Grotesk', sans-serif;\n  font-size: 30px;\n  line-height: 1.5;\n  color: rgba(240,234,216,0.5);\n}\n\n/* P4 · Cream · \"El médico de [cabecera]\" · Énfasis 5 (chip) */\n.p4 { background: #F2EBD9; }\n.p4 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 112px;\n  line-height: 1.04;\n  letter-spacing: -0.035em;\n  color: #2A2A2A;\n}\n.p4 .em {\n  display: inline-block;\n  background: #E85A35;\n  color: #fff;\n  border-radius: 16px;\n  padding: 0 24px 8px;\n  line-height: 1.15;\n}\n.p4 .sub {\n  font-size: 28px;\n  line-height: 1.5;\n  color: rgba(42,42,42,0.5);\n}\n\n/* P5 · Paper · Lista de 3 con separadores · Énfasis 3 (color) */\n.p5 { background: #FBF7EC; }\n.p5 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 84px;\n  line-height: 1.08;\n  letter-spacing: -0.03em;\n  color: #2A2A2A;\n}\n.p5-list {\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n  flex: 1;\n  justify-content: center;\n}\n.p5-item {\n  display: flex;\n  align-items: center;\n  gap: 32px;\n  padding: 40px 0;\n  border-bottom: 1px solid rgba(42,42,42,0.1);\n}\n.p5-item:last-child { border-bottom: none; }\n.p5-num {\n  font-family: 'Space Mono', monospace;\n  font-weight: 700;\n  font-size: 20px;\n  letter-spacing: 0.06em;\n  color: #E85A35;\n  flex-shrink: 0;\n  width: 52px;\n}\n.p5-copy {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 48px;\n  letter-spacing: -0.025em;\n  color: #2A2A2A;\n  line-height: 1.1;\n}\n.p5-copy span { font-weight: 400; color: rgba(42,42,42,0.5); font-size: 0.72em; }\n\n/* P6 · Midnight · \"¿Te sentís mal?\" · Énfasis 5 (chip) */\n.p6 { background: #1C2130; }\n.p6::before {\n  content: '';\n  position: absolute; inset: 0; pointer-events: none;\n  background:\n    radial-gradient(ellipse 60% 60% at 80% 20%, rgba(255,82,48,.20) 0%, transparent 60%),\n    radial-gradient(ellipse 55% 55% at 15% 75%, rgba(0,184,124,.18) 0%, transparent 60%);\n}\n.p6 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 118px;\n  line-height: 1.04;\n  letter-spacing: -0.035em;\n  color: #F0EAD8;\n}\n.p6 .em {\n  display: inline-block;\n  background: #FF5230;\n  color: #fff;\n  border-radius: 16px;\n  padding: 0 24px 8px;\n  line-height: 1.15;\n}\n.p6 .sub {\n  font-size: 30px;\n  line-height: 1.5;\n  color: rgba(240,234,216,0.5);\n}\n.p6 .cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 18px;\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 600;\n  font-size: 32px;\n  color: #04241A;\n  background: #00B87C;\n  border-radius: 999px;\n  padding: 26px 56px;\n  width: fit-content;\n  box-shadow: 0 10px 40px rgba(0,184,124,.45);\n  position: relative;\n  overflow: hidden;\n}\n.p6 .cta::before {\n  content: '';\n  position: absolute; inset: 0; border-radius: 999px;\n  background: linear-gradient(130deg, rgba(255,255,255,.28) 0%, transparent 50%);\n}\n\n/* P7 · Cream · Social proof · Énfasis 9 (highlight) */\n.p7 { background: #F2EBD9; }\n.p7 .num {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 188px;\n  line-height: 0.9;\n  letter-spacing: -0.05em;\n  color: #E85A35;\n  margin-bottom: 20px;\n}\n.p7 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 68px;\n  line-height: 1.1;\n  letter-spacing: -0.025em;\n  color: #2A2A2A;\n}\n.p7 .em {\n  background: linear-gradient(180deg, transparent 38%, rgba(94,196,138,.5) 38%);\n}\n.p7 .sub {\n  font-size: 26px;\n  color: rgba(42,42,42,0.48);\n  line-height: 1.5;\n}\n\n/* P8 · Paper · \"No es un bot.\" · Énfasis 7 (outline) + Cream */\n.p8 { background: #FBF7EC; }\n.p8 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 118px;\n  line-height: 1.04;\n  letter-spacing: -0.04em;\n  color: #2A2A2A;\n}\n.p8 .em {\n  -webkit-text-stroke: 2.5px #2A2A2A;\n  color: transparent;\n}\n.p8 .sub {\n  font-size: 30px;\n  line-height: 1.5;\n  color: rgba(42,42,42,0.48);\n}\n.p8 .feature-row {\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  font-family: 'Space Mono', monospace;\n  font-size: 19px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: rgba(42,42,42,0.38);\n}\n.p8 .fdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }\n\n/* Stories */\n/* S1 — Cream story · \"Escribís. Te atendemos.\" */\n.s1 { background: #F2EBD9; }\n.s1 .headline {\n  font-family: 'Space Grotesk', sans-serif;\n  font-weight: 700;\n  font-size: 130px;\n  line-height: 1.02;\n  letter-spacing: -0.038em;\n  color: #2A2A2A;\n}\n.s1 .em { color: #E85A35; }\n.s1 .sub {\n  font-size: 38px;\n  line-height: 1.5;\n  color: rgba(42,42,42,0.52);\n}\n.s1 .cta {\n  display:
